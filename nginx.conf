worker_processes auto;
rtmp_auto_push on;
events {}

rtmp {
    server {
        listen 1935;
        listen [::]:1935 ipv6only=on;    

        application live {
            live on;
            record off;
            
            # Bật HLS
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            
            # Tự động dọn dẹp các file .ts cũ và xóa toàn bộ khi tắt luồng stream
            hls_cleanup on;
        }
    }
}

http {
    server {
        listen 80;

        location /live {
            # Phục vụ các file HLS (.m3u8 và .ts)
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            # URL /live/test.m3u8 -> file /tmp/hls/test.m3u8
            alias /tmp/hls/;
            
            # Cấu hình CORS để trình duyệt web (hls.js) có thể tải file HLS
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Origin, Accept, Content-Type';
            add_header Access-Control-Expose-Headers 'Server,range,Content-Length,Content-Range';
            
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Allow-Headers 'Origin, Accept, Content-Type';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain charset=UTF-8';
                add_header Content-Length 0;
                return 204;
            }
        }
    }
}
