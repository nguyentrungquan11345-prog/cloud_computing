<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Streaming Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e6edf5;
            color: #333;
            padding: 30px 15px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
        }

        @media (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* --- PHẦN BÊN TRÁI: PLAYER --- */
        .main-wrapper {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        #video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-info-bar {
            display: flex;
            align-items: center;
            margin-top: 15px;
            background: #f4f7fc;
            border-radius: 8px;
            overflow: hidden;
            height: 60px;
        }

        /* Badge Bình Luận Viên (Xéo) */
        .commentator-badge {
            background-color: #0062cc;
            height: 100%;
            padding: 0 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
            color: white;
            min-width: 180px;
        }

        .commentator-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            background-color: #ccc;
            object-fit: cover;
        }

        .commentator-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .live-tag {
            background-color: #e50027;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 2px;
            width: fit-content;
        }

        .commentator-name {
            font-weight: bold;
            font-size: 15px;
            white-space: nowrap;
        }

        /* Chi tiết trận đấu */
        .match-title {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .vs-badge {
            background-color: #e50027;
            color: white;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 16px;
        }

        /* Phần Trạng thái websocket cập nhật tỷ số */
        #status-bar {
            margin-top: 15px;
            padding: 12px;
            background: #222;
            color: #fff;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
        }

        /* --- PHẦN BÊN PHẢI: SIDEBAR --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-card {
            background: linear-gradient(135deg, #0f2444 0%, #1e4b8f 100%);
            border: 2px solid #00a8ff;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            overflow: hidden;
        }

        .card-live-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #e50027;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-live-tag::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .card-matchup {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .card-logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: white;
            padding: 2px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .card-vs {
            font-size: 22px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card-commentator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 4px 12px 4px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .card-commentator img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Cột Trái: Player -->
        <div class="main-content">
            <div class="main-wrapper">
                <div id="video-container"></div>
                
                <div class="match-info-bar">
                    <div class="commentator-badge">
                        <img src="https://i.pravatar.cc/100?img=11" alt="BLV" class="commentator-avatar">
                        <div class="commentator-details">
                            <span class="live-tag">LIVE ||||</span>
                            <span class="commentator-name">BLV Sún</span>
                        </div>
                    </div>
                    
                    <div class="match-title">
                        <span id="teamA-name">Team Đỏ</span>
                        <img src="https://flagcdn.com/w80/vn.png" alt="VN" class="team-logo">
                        <span class="vs-badge">VS</span>
                        <img src="https://flagcdn.com/w80/kr.png" alt="KR" class="team-logo">
                        <span id="teamB-name">Team Xanh</span>
                    </div>
                </div>
            </div>

            <!-- Thanh trạng thái Websocket -->
            <div id="status-bar">
                Trạng thái: <span id="status" style="color:#aaa;">Đang chờ sự kiện...</span>
            </div>
        </div>

        <!-- Cột Phải: Sidebar Danh sách trận -->
        <div class="sidebar">
            <!-- Card 1 -->
            <div class="match-card">
                <div class="card-live-tag">LIVE</div>
                <div class="card-matchup">
                    <img src="https://flagcdn.com/w80/fr.png" alt="FR" class="card-logo">
                    <span class="card-vs">VS</span>
                    <img src="https://flagcdn.com/w80/dk.png" alt="DK" class="card-logo">
                </div>
                <div class="card-commentator">
                    <img src="https://i.pravatar.cc/100?img=12" alt="BLV">
                    BLV Dần
                </div>
            </div>

            <!-- Card 2 -->
            <div class="match-card">
                <div class="card-live-tag">LIVE</div>
                <div class="card-matchup">
                    <img src="https://flagcdn.com/w80/de.png" alt="DE" class="card-logo">
                    <span class="card-vs">VS</span>
                    <img src="https://flagcdn.com/w80/es.png" alt="ES" class="card-logo">
                </div>
                <div class="card-commentator">
                    <img src="https://i.pravatar.cc/100?img=13" alt="BLV">
                    BLV Trĩ
                </div>
            </div>
            
            <!-- Card 3 -->
            <div class="match-card">
                <div class="card-live-tag">LIVE</div>
                <div class="card-matchup">
                    <img src="https://flagcdn.com/w80/jp.png" alt="JP" class="card-logo">
                    <span class="card-vs">VS</span>
                    <img src="https://flagcdn.com/w80/sa.png" alt="SA" class="card-logo">
                </div>
                <div class="card-commentator">
                    <img src="https://i.pravatar.cc/100?img=14" alt="BLV">
                    BLV Mão
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // PHẦN 1: TƯƠNG TÁC DOM & WEBSOCKET
        // ==========================================
        const statusText = document.getElementById('status');

        // Khởi tạo kết nối tới server FastAPI (cổng 8000)
        const ws = new WebSocket('ws://localhost:8000/ws');

        ws.onopen = () => {
            console.log("Đã kết nối thành công tới WebSocket Server!");
        };

        // Lắng nghe dữ liệu (mock event) từ server đẩy xuống
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Nhận được sự kiện:", data);
            
            statusText.innerText = `[${new Date(data.event_timestamp).toLocaleTimeString()}] ${data.team} Ghi bàn! Tỷ số: ${data.score}`;
            statusText.style.color = "#00ff00";
        };

        ws.onclose = () => {
            console.log("Mất kết nối tới server.");
            statusText.innerText = "Mất kết nối tới máy chủ cập nhật tỷ số...";
            statusText.style.color = "red";
        };

        // ==========================================
        // PHẦN 2: CẤU HÌNH HLS.JS (VIDEO PLAYER)
        // ==========================================
        const video = document.createElement('video');
        video.id = 'video-player';
        video.controls = true;
        video.autoplay = true;
        video.muted = true;
        document.getElementById('video-container').appendChild(video);
        
        const videoSrc = 'http://localhost:8080/live/test.m3u8';

        // Chrome/Firefox cần hls.js để đọc m3u8
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log("Luồng video đã sẵn sàng!");
                video.play().catch(e => console.log(e));
            });
        } 
        // Dành cho Safari (hỗ trợ m3u8 mặc định)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
